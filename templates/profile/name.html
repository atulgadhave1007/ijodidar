{% extends 'base.html' %}
{% block title %}Your Name – iJodidar{% endblock %}
{% block content %}
<div class="ij-container" style="max-width:600px;">
  <a href="{{ url_for('profile.profile') }}" class="d-inline-flex align-items-center gap-2 mb-4"
     style="color:var(--text-2);text-decoration:none;font-size:13.5px;font-weight:600;">
    <i class="bi bi-arrow-left"></i> Back
  </a>
  <div class="ij-card">
    <div class="ij-card-header">
      <div style="font-weight:800;font-size:17px;">Your Name</div>
      <div style="font-size:13px;color:var(--text-2);font-weight:400;margin-top:2px;">Update your first and last name</div>
    </div>
    <div class="ij-card-body">
      <form method="POST">
  <div class="row g-3">
    <div class="col-6">
      <label class="form-label" style="font-weight:600;font-size:13px;color:var(--text-2);">First Name</label>
      <input type="text" name="firstName" class="form-control" value="{{ current_user.first_name }}"
             required style="border-radius:8px;padding:10px 14px;border:1.5px solid var(--border);">
    </div>
    <div class="col-6">
      <label class="form-label" style="font-weight:600;font-size:13px;color:var(--text-2);">Last Name</label>
      <input type="text" name="lastName" class="form-control" value="{{ current_user.last_name }}"
             required style="border-radius:8px;padding:10px 14px;border:1.5px solid var(--border);">
    </div>
  </div>
  <div class="d-flex gap-3 mt-4">
  <button type="submit" class="btn-ij-primary" style="padding:11px 28px;border-radius:8px;font-size:14px;">{{ 'Save Changes'|t }}</button>
  <a href="{{ url_for('profile.profile') }}" class="btn-ij-ghost" style="padding:10px 24px;border-radius:8px;font-size:14px;">{{ 'Cancel'|t }}</a>
</div>
</form>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}{% endblock %}
