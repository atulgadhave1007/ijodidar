{% extends 'base.html' %}
{% block title %}Education – iJodidar{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-4">
  <div class="row">
  <div class="col-3 d-none d-lg-block" style="min-width:220px;max-width:240px;">
    <div class="card rounded-4 shadow-sm position-sticky" style="top:5rem;">
      <div class="card-body p-3">
        <ul class="nav flex-column gap-1">
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="{{ url_for('main.home') }}"><i class="bi bi-house-door-fill me-2"></i>Home</a></li>
          <li><a class="nav-link rounded-3 bg-danger bg-opacity-10 text-danger fw-semibold px-3 py-2" href="{{ url_for('profile.profile') }}"><i class="bi bi-person-circle me-2"></i>Personal Info</a></li>
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="{{ url_for('family.family') }}"><i class="bi bi-people-fill me-2"></i>My Family</a></li>
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="#"><i class="bi bi-shield-lock-fill me-2"></i>Data &amp; Privacy</a></li>
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="#"><i class="bi bi-credit-card-fill me-2"></i>Payments</a></li>
        </ul>
      </div>
    </div>
  </div>
    <div class="col d-flex justify-content-center">
      <div style="width:100%;max-width:600px;">
        <a href="{{ url_for('profile.profile') }}" class="btn btn-sm btn-outline-secondary rounded-pill mb-4">
          <i class="bi bi-arrow-left me-1"></i>Back
        </a>
        <div class="card rounded-4 shadow-sm">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-4">Education Details</h5>
            <form method="POST">
              <div class="row g-3">
  <div class="col-md-6">
    <label class="form-label fw-medium">Degree</label>
    <input type="text" name="degree" class="form-control" value="{{ education.degree or '' if education else '' }}" placeholder="B.Tech / B.E. / M.Tech">
  </div>
  <div class="col-md-6">
    <label class="form-label fw-medium">Specialization</label>
    <input type="text" name="specialization" class="form-control" value="{{ education.specialization or '' if education else '' }}" placeholder="Computer Science">
  </div>
  <div class="col-12">
    <label class="form-label fw-medium">University</label>
    <input type="text" name="university" class="form-control" value="{{ education.university or '' if education else '' }}" placeholder="Pune University">
  </div>
  <div class="col-12">
    <label class="form-label fw-medium">Institution / College</label>
    <input type="text" name="institution" class="form-control" value="{{ education.institution or '' if education else '' }}" placeholder="College of Engineering">
  </div>
  <div class="col-md-6">
    <label class="form-label fw-medium">Year of Passing</label>
    <input type="number" name="year_of_passing" class="form-control" min="1970" max="2030" value="{{ education.year_of_passing or '' if education else '' }}">
  </div>
  <div class="col-md-6">
    <label class="form-label fw-medium">Grade / Percentage</label>
    <input type="text" name="grade" class="form-control" placeholder="8.5 CGPA / 85%" value="{{ education.grade or '' if education else '' }}">
  </div>
</div>
              <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-danger rounded-pill px-4">Save Changes</button>
                <a href="{{ url_for('profile.profile') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}{% endblock %}
