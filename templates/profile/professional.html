{% extends 'base.html' %}
{% block title %}Professional Details – iJodidar{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-4">
  <div class="row">
  <div class="col-3 d-none d-lg-block" style="min-width:220px;max-width:240px;">
    <div class="card rounded-4 shadow-sm position-sticky" style="top:5rem;">
      <div class="card-body p-3">
        <ul class="nav flex-column gap-1">
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="{{ url_for('main.home') }}"><i class="bi bi-house-door-fill me-2"></i>Home</a></li>
          <li><a class="nav-link rounded-3 bg-danger bg-opacity-10 text-danger fw-semibold px-3 py-2" href="{{ url_for('profile.profile') }}"><i class="bi bi-person-circle me-2"></i>Personal Info</a></li>
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="{{ url_for('family.family') }}"><i class="bi bi-people-fill me-2"></i>My Family</a></li>
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="#"><i class="bi bi-shield-lock-fill me-2"></i>Data &amp; Privacy</a></li>
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="#"><i class="bi bi-credit-card-fill me-2"></i>Payments</a></li>
        </ul>
      </div>
    </div>
  </div>
    <div class="col d-flex justify-content-center">
      <div style="width:100%;max-width:600px;">
        <a href="{{ url_for('profile.profile') }}" class="btn btn-sm btn-outline-secondary rounded-pill mb-4">
          <i class="bi bi-arrow-left me-1"></i>Back
        </a>
        <div class="card rounded-4 shadow-sm">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-4">Work & Professional Info</h5>
            <form method="POST">
              <div class="row g-3">
  <div class="col-md-6">
    <label class="form-label fw-medium">Occupation</label>
    <input type="text" name="occupation" class="form-control" value="{{ professional.occupation or '' if professional else '' }}" placeholder="Software Engineer">
  </div>
  <div class="col-md-6">
    <label class="form-label fw-medium">Company</label>
    <input type="text" name="company_name" class="form-control" value="{{ professional.company_name or '' if professional else '' }}">
  </div>
  <div class="col-md-6">
    <label class="form-label fw-medium">Designation</label>
    <input type="text" name="designation" class="form-control" value="{{ professional.designation or '' if professional else '' }}">
  </div>
  <div class="col-md-6">
    <label class="form-label fw-medium">Employment Type</label>
    <select name="employment_type" class="form-select">
      <option value="">-- Select --</option>
      {% for et in ['Full-time','Part-time','Self-employed','Business','Contract','Freelance'] %}
      <option value="{{ et }}" {% if professional and professional.employment_type==et %}selected{% endif %}>{{ et }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label fw-medium">Years of Experience</label>
    <input type="number" name="years_of_experience" class="form-control" min="0" max="50" value="{{ professional.years_of_experience or '' if professional else '' }}">
  </div>
  <div class="col-md-6">
    <label class="form-label fw-medium">Annual Package</label>
    <input type="text" name="package" class="form-control" placeholder="e.g. 12 LPA" value="{{ professional.package or '' if professional else '' }}">
  </div>
  <div class="col-md-6">
    <label class="form-label fw-medium">Business Turnover</label>
    <input type="text" name="turn_over" class="form-control" placeholder="e.g. 1 Crore" value="{{ professional.turn_over or '' if professional else '' }}">
  </div>
  <div class="col-md-6">
    <label class="form-label fw-medium">Work Location</label>
    <input type="text" name="location" class="form-control" value="{{ professional.location or '' if professional else '' }}">
  </div>
</div>
              <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-danger rounded-pill px-4">Save Changes</button>
                <a href="{{ url_for('profile.profile') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}{% endblock %}
