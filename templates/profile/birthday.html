{% extends 'base.html' %}
{% block title %}Birthday – iJodidar{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-4">
  <div class="row">
  <div class="col-3 d-none d-lg-block" style="min-width:220px;max-width:240px;">
    <div class="card rounded-4 shadow-sm position-sticky" style="top:5rem;">
      <div class="card-body p-3">
        <ul class="nav flex-column gap-1">
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="{{ url_for('main.home') }}"><i class="bi bi-house-door-fill me-2"></i>Home</a></li>
          <li><a class="nav-link rounded-3 bg-danger bg-opacity-10 text-danger fw-semibold px-3 py-2" href="{{ url_for('profile.profile') }}"><i class="bi bi-person-circle me-2"></i>Personal Info</a></li>
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="{{ url_for('family.family') }}"><i class="bi bi-people-fill me-2"></i>My Family</a></li>
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="#"><i class="bi bi-shield-lock-fill me-2"></i>Data &amp; Privacy</a></li>
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="#"><i class="bi bi-credit-card-fill me-2"></i>Payments</a></li>
        </ul>
      </div>
    </div>
  </div>
    <div class="col d-flex justify-content-center">
      <div style="width:100%;max-width:600px;">
        <a href="{{ url_for('profile.profile') }}" class="btn btn-sm btn-outline-secondary rounded-pill mb-4"><i class="bi bi-arrow-left me-1"></i>Back</a>
        <div class="card rounded-4 shadow-sm">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-4">Birth Details <span class="text-muted small">जन्म तपशील</span></h5>
            <form method="POST">
              <div class="row g-3 mb-4">
                <div class="col-4">
                  <label class="form-label fw-medium">Month</label>
                  <select name="month" class="form-select" required>
                    <option value="">Month</option>
                    {% for m in ['January','February','March','April','May','June','July','August','September','October','November','December'] %}
                    <option value="{{ m }}" {% if month==m %}selected{% endif %}>{{ m }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="col-4">
                  <label class="form-label fw-medium">Day</label>
                  <select name="date" class="form-select" required>
                    <option value="">Day</option>
                    {% for d in range(1,32) %}
                    <option value="{{ d }}" {% if day|string==d|string %}selected{% endif %}>{{ d }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="col-4">
                  <label class="form-label fw-medium">Year</label>
                  <select name="year" class="form-select" required>
                    <option value="">Year</option>
                    {% for y in range(date.today().year - 18, 1940, -1) %}
                    <option value="{{ y }}" {% if year|string==y|string %}selected{% endif %}>{{ y }}</option>
                    {% endfor %}
                  </select>
                </div>
              </div>
              <hr>
              <h6 class="fw-semibold mb-3 mt-3">Additional Birth Info</h6>
              <div class="row g-3">
                <div class="col-6">
                  <label class="form-label fw-medium">Birth Time</label>
                  <input type="time" name="birth_time" class="form-control" value="{{ birth_time }}">
                </div>
                <div class="col-6">
                  <label class="form-label fw-medium">Birth Village</label>
                  <input type="text" name="birth_village" class="form-control" value="{{ birth_village }}">
                </div>
                <div class="col-6">
                  <label class="form-label fw-medium">Birth City</label>
                  <input type="text" name="birth_city" class="form-control" value="{{ birth_city }}">
                </div>
                <div class="col-6">
                  <label class="form-label fw-medium">Birth State</label>
                  <input type="text" name="birth_state" class="form-control" value="{{ birth_state }}">
                </div>
                <div class="col-12">
                  <label class="form-label fw-medium">Birth Country</label>
                  <input type="text" name="birth_country" class="form-control" value="{{ birth_country }}">
                </div>
              </div>
              <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-danger rounded-pill px-4">Save</button>
                <a href="{{ url_for('profile.profile') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
