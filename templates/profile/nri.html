{% extends 'base.html' %}
{% block title %}NRI Status – iJodidar{% endblock %}
{% block content %}
<div class="ij-container" style="max-width:540px;">
  <a href="{{ url_for('profile.profile') }}"
     class="d-inline-flex align-items-center gap-2 mb-4"
     style="color:var(--text-2);text-decoration:none;font-size:13.5px;font-weight:600;">
    <i class="bi bi-arrow-left"></i> Back
  </a>
  <div class="ij-card">
    <div class="ij-card-header">
      <div style="font-weight:800;font-size:17px;">NRI / Abroad Status</div>
      <div style="font-size:13px;color:var(--text-2);font-weight:400;margin-top:2px;">
        NRI profiles get a special badge and appear in NRI-specific searches
      </div>
    </div>
    <div class="ij-card-body">
      <form method="POST">
        <div class="mb-4">
          <label style="cursor:pointer;display:flex;align-items:flex-start;gap:14px;
                        padding:16px;border:1.5px solid var(--border);border-radius:10px;">
            <input type="checkbox" name="is_nri" value="1"
                   {% if profile and profile.is_nri %}checked{% endif %}
                   style="width:20px;height:20px;accent-color:var(--brand);margin-top:2px;">
            <div>
              <div style="font-weight:700;font-size:14px;">I am based outside India (NRI)</div>
              <div style="font-size:12.5px;color:var(--text-2);margin-top:3px;">
                Currently living in USA, UK, Australia, UAE, Canada or any other country outside India
              </div>
            </div>
          </label>
        </div>
        <div class="mb-4">
          <label class="form-label"
                 style="font-weight:600;font-size:13px;color:var(--text-2);">
            Country of Residence
          </label>
          <input type="text" name="nri_country" class="form-control"
                 value="{{ profile.nri_country or '' if profile else '' }}"
                 placeholder="e.g. United States, United Kingdom, Australia"
                 style="border-radius:8px;border:1.5px solid var(--border);padding:10px 14px;">
        </div>
        <div class="d-flex gap-3">
          <button type="submit" class="btn-ij-primary"
                  style="padding:11px 28px;border-radius:8px;font-size:14px;">
            Save
          </button>
          <a href="{{ url_for('profile.profile') }}" class="btn-ij-ghost"
             style="padding:10px 24px;border-radius:8px;font-size:14px;">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
