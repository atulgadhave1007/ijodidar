{% extends 'base.html' %}
{% block title %}Gender – iJodidar{% endblock %}
{% block content %}
<div class="ij-container" style="max-width:600px;">
  <a href="{{ url_for('profile.profile') }}" class="d-inline-flex align-items-center gap-2 mb-4"
     style="color:var(--text-2);text-decoration:none;font-size:13.5px;font-weight:600;">
    <i class="bi bi-arrow-left"></i> Back
  </a>
  <div class="ij-card">
    <div class="ij-card-header">
      <div style="font-weight:800;font-size:17px;">Gender</div>
      <div style="font-size:13px;color:var(--text-2);font-weight:400;margin-top:2px;">Select your gender</div>
    </div>
    <div class="ij-card-body">
      <form method="POST">
  <div class="d-flex flex-column gap-3">
    {% for g in ['Male','Female','Other'] %}
    <label style="cursor:pointer;">
      <div class="d-flex align-items-center gap-3 p-4"
           style="border:2px solid {{ 'var(--brand)' if profile and profile.gender==g else 'var(--border)' }};
                  border-radius:12px;transition:border-color .15s;background:{{ 'var(--brand-alpha)' if profile and profile.gender==g else 'transparent' }};">
        <input type="radio" name="gender" value="{{ g }}"
               {{ 'checked' if profile and profile.gender==g else '' }}
               style="accent-color:var(--brand);width:18px;height:18px;">
        <div>
          <div style="font-weight:600;font-size:14px;">{{ g }}</div>
        </div>
      </div>
    </label>
    {% endfor %}
  </div>
  <div class="d-flex gap-3 mt-4">
  <button type="submit" class="btn-ij-primary" style="padding:11px 28px;border-radius:8px;font-size:14px;">{{ 'Save Changes'|t }}</button>
  <a href="{{ url_for('profile.profile') }}" class="btn-ij-ghost" style="padding:10px 24px;border-radius:8px;font-size:14px;">{{ 'Cancel'|t }}</a>
</div>
</form>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}{% endblock %}
