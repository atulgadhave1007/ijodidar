{% extends 'base.html' %}
{% block title %}{{ tag|capitalize }} Address – iJodidar{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-4">
  <div class="row">
  <div class="col-3 d-none d-lg-block" style="min-width:220px;max-width:240px;">
    <div class="card rounded-4 shadow-sm position-sticky" style="top:5rem;">
      <div class="card-body p-3">
        <ul class="nav flex-column gap-1">
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="{{ url_for('main.home') }}"><i class="bi bi-house-door-fill me-2"></i>Home</a></li>
          <li><a class="nav-link rounded-3 bg-danger bg-opacity-10 text-danger fw-semibold px-3 py-2" href="{{ url_for('profile.profile') }}"><i class="bi bi-person-circle me-2"></i>Personal Info</a></li>
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="{{ url_for('family.family') }}"><i class="bi bi-people-fill me-2"></i>My Family</a></li>
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="#"><i class="bi bi-shield-lock-fill me-2"></i>Data &amp; Privacy</a></li>
          <li><a class="nav-link rounded-3 text-dark px-3 py-2" href="#"><i class="bi bi-credit-card-fill me-2"></i>Payments</a></li>
        </ul>
      </div>
    </div>
  </div>
    <div class="col d-flex justify-content-center">
      <div style="width:100%;max-width:640px;">
        <a href="{{ url_for('profile.profile') }}" class="btn btn-sm btn-outline-secondary rounded-pill mb-4"><i class="bi bi-arrow-left me-1"></i>Back</a>
        <div class="card rounded-4 shadow-sm">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-4">{{ tag|capitalize }} Address</h5>
            <form method="POST">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label fw-medium">Address Line 1</label>
                  <input type="text" name="address1" class="form-control" value="{{ address.address1 if address else '' }}" required>
                </div>
                <div class="col-12">
                  <label class="form-label fw-medium">Address Line 2</label>
                  <input type="text" name="address2" class="form-control" value="{{ address.address2 if address else '' }}">
                </div>
                <div class="col-12">
                  <label class="form-label fw-medium">Address Line 3</label>
                  <input type="text" name="address3" class="form-control" value="{{ address.address3 if address else '' }}">
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-medium">Country</label>
                  <select name="country_id" id="countrySelect" class="form-select" required
                          data-selected="{{ address.country_id if address else '' }}">
                    <option value="">-- Select --</option>
                    {% for c in countries %}
                    <option value="{{ c.id }}" {% if address and address.country_id==c.id %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-medium">State</label>
                  <select name="state_id" id="stateSelect" class="form-select" required
                          data-selected="{{ address.state_id if address else '' }}">
                    <option value="">-- Select --</option>
                    {% for s in states %}
                    <option value="{{ s.id }}" {% if address and address.state_id==s.id %}selected{% endif %}>{{ s.name }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-medium">City</label>
                  <select name="city_id" id="citySelect" class="form-select" required
                          data-selected="{{ address.city_id if address else '' }}">
                    <option value="">-- Select --</option>
                    {% for c in cities %}
                    <option value="{{ c.id }}" {% if address and address.city_id==c.id %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-medium">ZIP / PIN Code</label>
                  <input type="text" name="zipcode" class="form-control" value="{{ address.zipcode if address else '' }}" required>
                </div>
              </div>
              <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-danger rounded-pill px-4">Save Address</button>
                <a href="{{ url_for('profile.profile') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
window.locationData = {
  states: [{% for s in states %}{"id":{{ s.id }},"name":"{{ s.name|e }}","country_id":{{ s.country_id }}}{% if not loop.last %},{% endif %}{% endfor %}],
  cities: [{% for c in cities %}{"id":{{ c.id }},"name":"{{ c.name|e }}","state_id":{{ c.state_id }}}{% if not loop.last %},{% endif %}{% endfor %}]
};
</script>
<script src="{{ url_for('static', filename='js/location_cascade.js') }}"></script>
{% endblock %}
