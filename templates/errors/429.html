<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Too Many Requests – iJodidar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f8f9fa; }
    .error-code { font-family: 'Syne', sans-serif; font-size: 7rem; font-weight: 800;
                   color: #dc3545; opacity: .12; line-height: 1; }
    .error-icon { font-size: 3.5rem; color: #dc3545; }
  </style>
</head>
<body>
  <div class="min-vh-100 d-flex flex-column align-items-center justify-content-center text-center px-3">
    <div class="error-code">429</div>
    <div class="error-icon mb-3 mt-n3"><i class="bi bi-hourglass-split"></i></div>
    <h2 class="fw-bold mb-2" style="font-family:'Syne',sans-serif;">Slow down a little!</h2>
    <p class="text-muted mb-4" style="max-width:420px;">You've made too many requests in a short time. Please wait a minute and try again.</p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <a href="{{ request.referrer or url_for('main.home') }}" class="btn btn-danger rounded-pill px-4">Go Back</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
