{% extends 'base.html' %}
{% block title %}Verify Phone – iJodidar{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:80vh;">
  <div class="card rounded-4 shadow-sm p-4" style="width:100%;max-width:420px;">
    <div class="text-center mb-4">
      <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex align-items-center
                  justify-content-center mb-3" style="width:60px;height:60px;">
        <i class="bi bi-phone-fill text-success fs-3"></i>
      </div>
      <h5 class="fw-bold mb-1">Verify Your Phone</h5>
      <p class="text-muted small mb-0">Enter the 6-digit OTP sent to
        <strong>{{ current_user.phone }}</strong>
      </p>
    </div>
    <form method="POST">
      <div class="mb-4">
        <input type="text" name="otp" class="form-control form-control-lg text-center
               fw-bold rounded-pill letter-spacing-2"
               maxlength="6" pattern="[0-9]{6}" placeholder="— — — — — —"
               autofocus required style="font-size:1.5rem;letter-spacing:.5rem;">
        <div class="form-text text-center">OTP valid for 10 minutes</div>
      </div>
      <button type="submit" class="btn btn-success rounded-pill w-100 fw-semibold py-2">
        <i class="bi bi-check-circle me-2"></i>Verify OTP
      </button>
    </form>
    <hr class="my-3">
    <form method="POST" action="{{ url_for('auth.send_phone_otp') }}">
      <input type="hidden" name="phone" value="{{ current_user.phone }}">
      <button type="submit" class="btn btn-link text-muted w-100 small text-decoration-none">
        <i class="bi bi-arrow-clockwise me-1"></i>Resend OTP
      </button>
    </form>
    <div class="text-center mt-2">
      <a href="{{ url_for('profile.phone') }}" class="text-muted small text-decoration-none">
        <i class="bi bi-arrow-left me-1"></i>Change phone number
      </a>
    </div>
  </div>
</div>
{% endblock %}
