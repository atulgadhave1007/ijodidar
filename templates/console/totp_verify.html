<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>iJodidar Console — 2FA Verification</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;
         display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{background:#1e293b;border:1px solid #334155;border-radius:16px;
          padding:40px 36px;width:100%;max-width:400px;}
    .logo{font-size:1.4rem;font-weight:800;color:#d63031;display:block;text-align:center;margin-bottom:4px;}
    .subtitle{text-align:center;font-size:12px;color:#64748b;margin-bottom:32px;
              text-transform:uppercase;letter-spacing:.1em;font-weight:600;}
    label{display:block;font-size:12px;font-weight:600;color:#94a3b8;
          text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
    input{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:8px;
          padding:14px;color:#f1f5f9;font-size:22px;font-weight:700;outline:none;
          text-align:center;letter-spacing:8px;transition:border-color .15s;}
    input:focus{border-color:#d63031;}
    .btn{width:100%;background:#d63031;color:#fff;border:none;border-radius:8px;
         padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;}
    .error{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;
           border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;}
    .hint{color:#64748b;font-size:12.5px;text-align:center;margin-top:16px;line-height:1.6;}
    .back{display:block;text-align:center;margin-top:16px;color:#475569;font-size:12px;text-decoration:none;}
  </style>
</head>
<body>
<div class="card">
  <span class="logo">iJodidar</span>
  <div class="subtitle">Two-Factor Authentication</div>

  {% if error %}
  <div class="error"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div style="margin-bottom:16px;">
      <label><i class="bi bi-phone me-1"></i>Google Authenticator Code</label>
      <input type="text" name="totp_code" maxlength="6" pattern="[0-9]{6}"
             placeholder="000000" autofocus autocomplete="one-time-code" required
             inputmode="numeric">
    </div>
    <button type="submit" class="btn">
      <i class="bi bi-shield-check me-2"></i>Verify Code
    </button>
  </form>

  <div class="hint">
    Open Google Authenticator on your phone<br>and enter the 6-digit code for iJodidar Console.
  </div>
  <a href="/console/login" class="back">← Back to login</a>
</div>
</body>
</html>
