<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>iJodidar — Staff Console Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;
         display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{background:#1e293b;border:1px solid #334155;border-radius:16px;
          padding:40px 36px;width:100%;max-width:400px;box-shadow:0 25px 50px rgba(0,0,0,.5);}
    .logo{font-size:1.4rem;font-weight:800;color:#d63031;letter-spacing:-.02em;
          display:block;text-align:center;margin-bottom:4px;}
    .subtitle{text-align:center;font-size:12px;color:#64748b;margin-bottom:32px;
              text-transform:uppercase;letter-spacing:.1em;font-weight:600;}
    label{display:block;font-size:12px;font-weight:600;color:#94a3b8;
          text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
    input{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:8px;
          padding:11px 14px;color:#f1f5f9;font-size:14px;outline:none;
          transition:border-color .15s;}
    input:focus{border-color:#d63031;}
    input::placeholder{color:#475569;}
    .mb{margin-bottom:16px;}
    .btn{width:100%;background:#d63031;color:#fff;border:none;border-radius:8px;
         padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;
         transition:background .15s;}
    .btn:hover{background:#b91c1c;}
    .error{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;
           border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;}
    .footer{text-align:center;margin-top:24px;font-size:11px;color:#475569;}
  </style>
</head>
<body>
<div class="card">
  <span class="logo">iJodidar</span>
  <div class="subtitle">Staff Business Console</div>

  {% if error %}
  <div class="error"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="mb">
      <label>Staff Email</label>
      <input type="email" name="email" placeholder="you@ijodidar.in" autofocus required>
    </div>
    <div class="mb">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">
      <i class="bi bi-shield-lock me-2"></i>Sign In to Console
    </button>
  </form>

  <div class="footer">
    This portal is for iJodidar staff only.<br>
    <a href="/" style="color:#475569;text-decoration:none;">Return to iJodidar.in</a>
  </div>
</div>
</body>
</html>
